name: Claude PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_url:
        description: GitHub pull request URL to review
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out reviewer
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve PR URL
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.pr_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate review
        run: python tools/claude_review/claude_review.py --pr "${{ steps.pr.outputs.url }}" --output review.md

      - name: Post structured review comment
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Show review
        if: github.event_name == 'workflow_dispatch'
        run: cat review.md
